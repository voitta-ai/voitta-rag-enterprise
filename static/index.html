<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>voitta-image-rag</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <a href="/" class="logo">voitta-image-rag</a>
            <div class="header-actions">
                <span id="conn-status" class="status-pill disconnected">disconnected</span>
            </div>
        </div>
    </header>

    <main class="app-main">
        <div class="browser-container">
            <div class="toolbar">
                <div class="toolbar-group">
                    <button id="btn-new-folder" class="btn btn-primary" title="Create a managed folder under VOITTA_ROOT_PATH">📁 New folder</button>
                    <button id="btn-add-existing" class="btn btn-secondary" title="Register an existing folder anywhere on the host">＋ Add existing</button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <button id="btn-new-subfolder" class="btn btn-secondary" disabled title="Create a subfolder inside the selected managed folder">📂 New subfolder</button>
                    <button id="btn-upload" class="btn btn-secondary" disabled title="Upload a file into the selected managed folder">⬆ Upload</button>
                    <button id="btn-reindex" class="btn btn-secondary" disabled title="Hard re-index every file under the selected folder or subfolder">↻ Reindex</button>
                    <button id="btn-remove" class="btn btn-secondary" disabled title="Unregister the selected folder">🗑 Remove</button>
                </div>
                <input type="file" id="upload-input" hidden>
                <span id="root-hint" class="hint"></span>
            </div>

            <div class="browser-layout">
                <section class="folder-list-container">
                    <ul id="folder-list" class="tree"></ul>
                </section>

                <aside class="sidebar" id="sidebar">
                    <div class="sidebar-section sidebar-empty" id="sidebar-empty">
                        <p class="hint-large">Select a folder to see details.</p>
                    </div>

                    <div class="sidebar-section" id="folder-detail" hidden>
                        <h3 id="folder-name"></h3>
                        <p id="folder-path" class="path"></p>
                        <div class="badge-row">
                            <span id="folder-managed-badge" class="badge badge-managed" hidden>managed</span>
                            <span id="folder-source-badge" class="badge"></span>
                        </div>
                        <div class="kv-grid">
                            <span class="k">Files</span><span class="v" id="kv-files">–</span>
                            <span class="k">Indexed</span><span class="v" id="kv-indexed">–</span>
                            <span class="k">Errors</span><span class="v" id="kv-errors">–</span>
                            <span class="k">Pending</span><span class="v" id="kv-pending">–</span>
                            <span class="k">Total size</span><span class="v" id="kv-bytes">–</span>
                            <span class="k">Chunks</span><span class="v" id="kv-chunks">–</span>
                            <span class="k">Images</span><span class="v" id="kv-images">–</span>
                            <span class="k">Unique images</span><span class="v" id="kv-images-unique">–</span>
                        </div>
                        <table class="stats-table" id="ext-table" hidden>
                            <thead>
                                <tr><th>Type</th><th class="num">Count</th></tr>
                            </thead>
                            <tbody id="ext-tbody"></tbody>
                        </table>
                        <p id="upload-target-hint" class="hint" hidden>
                            Uploads go to <code id="upload-target">/</code>
                        </p>
                    </div>

                    <div class="sidebar-section" id="jobs-card">
                        <h3>
                            Recent jobs
                            <span class="header-actions-inline">
                                <button id="btn-retry-all" class="btn-text">Retry failed</button>
                                <button id="btn-clear-failed" class="btn-text">Clear</button>
                            </span>
                        </h3>
                        <ul id="jobs" class="job-rows"></ul>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- Modal: pick or create folder -->
    <div id="modal-backdrop" class="modal-backdrop" hidden>
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Add folder</h3>
                <button id="modal-close" class="btn-text">×</button>
            </div>

            <div id="modal-managed" class="modal-body" hidden>
                <label>Folder name</label>
                <input type="text" id="managed-name" placeholder="project-x">
                <p class="hint">Created under <code id="modal-root"></code>.</p>
                <div class="actions actions-right">
                    <button id="managed-create" class="btn btn-primary">Create folder</button>
                </div>
            </div>

            <div id="modal-picker" class="modal-body" hidden>
                <div class="picker-header">
                    <button id="picker-up" type="button" class="btn btn-secondary btn-sm">↑</button>
                    <code id="picker-path" class="picker-path"></code>
                </div>
                <ul id="picker-list" class="picker-list"></ul>
                <div class="actions actions-right">
                    <button id="picker-pick" class="btn btn-primary">Add this folder</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
