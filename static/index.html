<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>voitta-image-rag</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <h1>voitta-image-rag</h1>
        <span id="conn-status" class="status disconnected">disconnected</span>
    </header>
    <main>
        <aside class="sidebar">
            <section>
                <h2>Folders</h2>
                <div class="tabs">
                    <button class="tab active" data-mode="managed">Create new</button>
                    <button class="tab" data-mode="external">Add existing</button>
                </div>
                <form id="add-folder-managed" class="add-form">
                    <input type="text" name="name" placeholder="folder name" required>
                    <button type="submit">Create</button>
                </form>
                <form id="add-folder-external" class="add-form" hidden>
                    <input type="text" name="path" placeholder="/abs/path/to/folder" required>
                    <button type="submit">Add</button>
                </form>
                <p id="root-hint" class="hint"></p>
                <ul id="folder-list"></ul>
            </section>
            <section>
                <h2>Files</h2>
                <form id="upload-form" hidden>
                    <select id="upload-folder" required></select>
                    <input type="file" id="upload-input" required>
                    <button type="submit">Upload</button>
                </form>
                <ul id="file-list"></ul>
            </section>
        </aside>
        <section class="center">
            <h2>Search</h2>
            <form id="search-form">
                <input type="text" name="query" placeholder="search query" required>
                <button type="submit">Search</button>
            </form>
            <div id="search-results"></div>
        </section>
        <aside class="jobs">
            <h2>Jobs</h2>
            <ul id="job-list"></ul>
        </aside>
    </main>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
