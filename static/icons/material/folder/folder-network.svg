<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Solid rounded-square base — reads as a NAS/network drive badge -->
  <rect fill="#0277bd" x="1" y="1" width="30" height="30" rx="5" ry="5"/>
  <!-- Network topology: hub node + three spokes to leaf nodes -->
  <!-- Hub -->
  <circle fill="#fff" cx="16" cy="12" r="2.8"/>
  <!-- Spokes -->
  <line x1="16" y1="14.8" x2="8"  y2="21" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="14.8" x2="16" y2="22" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="14.8" x2="24" y2="21" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Leaf nodes -->
  <circle fill="#fff" cx="8"  cy="23" r="2.2"/>
  <circle fill="#fff" cx="16" cy="24" r="2.2"/>
  <circle fill="#fff" cx="24" cy="23" r="2.2"/>
</svg>
