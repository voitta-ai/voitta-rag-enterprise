name: image

# Builds and pushes the Voitta RAG Enterprise container image.
#
# Triggers:
# - push to main      → tag :main + :sha-<short>     (rolling dev image)
# - push of a v*.*.*  → tag :<semver> + :latest      (release image)
# - manual dispatch   → tag of the user's choice
#
# Customers consume this image; they never build it themselves. The
# Terraform module references the image by tag.

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (default: short SHA)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # The model-warm stage downloads ~5-7GB; give it room. Free runners
    # are slow but adequate, and the layer is cached after the first run.
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Free disk
        # The default GHA runner has ~14GB free. Pre-warmed models +
        # toolchain layers exceed that. Drop preinstalled SDKs we don't
        # use to claim back ~25GB.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                       /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
